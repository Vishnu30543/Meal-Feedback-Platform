spring:
  application:
    name: ashram-feedback

  # ============================================
  # Neon PostgreSQL Configuration
  # Replace with your Neon connection details
  # ============================================
  datasource:
    url: jdbc:postgresql://ep-noisy-morning-azv32p60-pooler.c-3.ap-southeast-1.aws.neon.tech/neondb?user=neondb_owner&password=npg_f8EacvDOnb9P&sslmode=require&channelBinding=require
    username: neondb_owner
    password: npg_f8EacvDOnb9P
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      keepalive-time: 60000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  cache:
    caffeine:
      spec: maximumSize=500,expireAfterWrite=300s

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ============================================
# Server Configuration
# ============================================
server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

# ============================================
# JWT Configuration
# ============================================
app:
  jwt:
    secret: ${JWT_SECRET:YXNocmFtLW1lYWwtZmVlZGJhY2stc3lzdGVtLXNlY3JldC1rZXktMjAyNi1wcm9kdWN0aW9uLXJlYWR5}
    expiration-ms: 86400000  # 24 hours
    admin-expiration-ms: 28800000  # 8 hours

# ============================================
# SpringDoc OpenAPI Configuration
# ============================================
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

# ============================================
# Actuator Configuration
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
  info:
    env:
      enabled: true

# ============================================
# Logging
# ============================================
logging:
  level:
    com.ashram.feedback: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
